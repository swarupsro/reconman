version: "3.9"

services:
  web:
    build: .
    command: python run.py
    ports:
      - "5000:5000"
    env_file:
      - .env.example
    volumes:
      - .:/app
      - sqlite-data:/app/instance
    depends_on:
      - redis

  worker:
    build: .
    command: python worker.py
    env_file:
      - .env.example
    volumes:
      - .:/app
      - sqlite-data:/app/instance
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  sqlite-data:
